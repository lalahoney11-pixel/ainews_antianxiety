    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0B0E14',
                            card: '#161B22',
                            accent: '#10B981',
                            primary: '#3B82F6',
                            border: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    backgroundImage: {
                        'glass-gradient': 'linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%)',
                        'neon-glow': 'linear-gradient(90deg, #10B981 0%, #3B82F6 100%)'
                    }
                }
            }
        }
    </script>
    <style data-purpose="custom-animations">
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-subtle {
            animation: pulse-subtle 3s ease-in-out infinite;
        }
        .glass-morphism {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        textarea:focus, input:focus {
            outline: none !important;
            border-color: #10B981 !important;
            box-shadow: 0 0 0 1px #10B981 !important;
        }
        .images-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            grid-auto-flow: row;
            direction: ltr;
            gap: 12px;
        }
        .image-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            aspect-ratio: 1;
        }
        .image-item:hover {
            transform: scale(1.05);
        }
        .image-item.selected {
            border-color: #10B981;
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-item .checkbox {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: transparent;
            transition: all 0.3s;
        }
        .image-item.selected .checkbox {
            background: #10B981;
            color: white;
        }
        .image-item .count-badge {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: #10B981;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: bold;
        }
        .image-item .delete-btn {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            opacity: 0;
            transition: all 0.3s;
            z-index: 10;
        }
        .image-item:hover .delete-btn {
            opacity: 1;
        }
        .video-player {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .video-player video {
            width: 100%;
            display: block;
        }
        .error-message {
            background: #ef4444;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }
        .error-message.active {
            display: block;
        }
        .loading-spinner {
            border: 3px solid rgba(16, 185, 129, 0.3);
            border-top-color: #10B981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 移动端优化 */
        @media (max-width: 640px) {
            header {
                padding: 12px 16px;
            }
            header nav {
                gap: 16px;
            }
            header nav a {
                font-size: 0.75rem;
            }
            main {
                padding: 16px;
                gap: 16px;
            }
            .images-container {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
            }
            .image-item .delete-btn {
                opacity: 1;
                width: 16px;
                height: 16px;
                font-size: 10px;
            }
            .image-item .checkbox {
                width: 16px;
                height: 16px;
                font-size: 10px;
            }
            .image-modal img {
                max-width: 95%;
                max-height: 70%;
            }
            .image-modal .close-btn {
                top: 10px;
                right: 10px;
                width: 36px;
                height: 36px;
            }
        }
        /* 图片预览模态框 */
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .image-modal.active {
            display: flex;
        }
        .image-modal img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .image-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .image-modal .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        .image-modal .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .image-modal .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .image-modal .prev-btn {
            left: 20px;
        }
        .image-modal .next-btn {
            right: 20px;
        }
        .image-modal .image-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

        async function generateContent() {
            const topicInput = document.getElementById('topicInput');
            const topic = topicInput.value.trim();

            if (!topic) {
                showError('请输入 AI 新闻主题');
                return;
            }

            const loading = document.getElementById('loading');
            const generateContentBtn = document.getElementById('generateContentBtn');
            const generateVideoBtn = document.getElementById('generateVideoBtn');
            
            loading.classList.remove('hidden');
            generateContentBtn.disabled = true;
            generateVideoBtn.disabled = true;
            hideError();

            try {
                const response = await fetch(API_CONFIG.url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow_id: API_CONFIG.workflow_id,
                        app_id: API_CONFIG.app_id,
                        parameters: { input: topic }
                    })
                });

                // 流式响应处理
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let resultData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    resultData = JSON.parse(data.content);
                                }
                            } catch (e) {}
                        }
                    }
                }

                if (!resultData) {
                    throw new Error('未获取到有效数据');
                }

                fillGeneratedContent(resultData);
            } catch (error) {
                console.error('Error:', error);
                showError('生成失败：' + error.message);
            } finally {
                loading.classList.add('hidden');
                generateContentBtn.disabled = false;
                generateVideoBtn.disabled = false;
            }
        }

        // 填充生成的内容
        function fillGeneratedContent(data) {
            const content = data.data || data;
            state.titles = [content.title1, content.title2, content.title3, content.title4, content.title5];
            state.script = content.content;
            state.images = [];
            state.selectedTitle = 0;

            const titlesText = state.titles.filter(t => t).join('\n');
            document.getElementById('titleInput').value = titlesText;
            document.getElementById('scriptContent').value = state.script;
            updateCharCount('titleInput', 'titleCount');
            updateCharCount('scriptContent', 'scriptCount');
            renderImages();
            alert('✅ AI内容生成成功！已自动填充标题和文案，请上传图片后生成视频。');
        }

        // 渲染图片
        function renderImages() {
            const container = document.getElementById('imagesContainer');
            const allImages = [...state.uploadedImages.map(img => img.url), ...state.images];
            
            container.innerHTML = allImages.map((imageUrl, index) => {
                const isSelected = state.selectedImages.has(index);
                const isUploaded = index < state.uploadedImages.length;
                return `
                    <div class="image-item ${isSelected ? 'selected' : ''}" onclick="toggleImage(${index})" ondblclick="event.stopPropagation(); openImageModal(${index})">
                        <img src="${imageUrl}" alt="Image ${index + 1}" onerror="handleImageError(this, '${imageUrl}')">
                        ${isUploaded ? `<div class="delete-btn" onclick="event.stopPropagation(); deleteUploadedImage(${index})">×</div>` : ''}
                        <div class="checkbox">${isSelected ? '✓' : ''}</div>
                        ${isSelected ? `<div class="count-badge">${getSelectionOrder(index)}</div>` : ''}
                    </div>
                `;
            }).join('');

            updateSelectedCount();
        }

        function getSelectionOrder(index) {
            const selectedArray = Array.from(state.selectedImages);
            return selectedArray.indexOf(index) + 1;
        }

        function toggleImage(index) {
            if (state.selectedImages.has(index)) {
                state.selectedImages.delete(index);
            } else {
                if (state.selectedImages.size >= 10) {
                    alert('最多只能选择 10 张图片');
                    return;
                }
                state.selectedImages.add(index);
            }
            renderImages();
        }

        function selectAll() {
            const allImages = [...state.uploadedImages.map(img => img.url), ...state.images];
            if (allImages.length <= 10) {
                state.selectedImages = new Set(Array.from({length: allImages.length}, (_, i) => i));
            } else {
                alert('图片超过 10 张，请手动选择');
            }
            renderImages();
        }

        function clearSelection() {
            state.selectedImages.clear();
            renderImages();
        }

        function handleImageError(img, imageUrl) {
            console.error('图片加载失败:', imageUrl);
            img.style.display = 'none';
            const placeholder = document.createElement('div');
            placeholder.style.cssText = 'width:100%;height:100%;background:#1f2937;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:12px;';
            placeholder.textContent = '加载失败';
            img.parentNode.appendChild(placeholder);
        }

        async function handleImageUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];

            for (const file of files) {
                if (!validTypes.includes(file.type)) {
                    alert(`文件 ${file.name} 不是有效的图片格式（支持 JPG、PNG）`);
                    continue;
                }
                if (file.size > 2 * 1024 * 1024) {
                    alert(`文件 ${file.name} 大小超过 2MB 限制`);
                    continue;
                }

                try {
                    let imageUrl;
                    // 优先使用 Vercel API 上传（更安全，密钥存储在环境变量中）
                    imageUrl = await uploadToVercelApi(file);
                    state.uploadedImages.push({ url: imageUrl, name: file.name });
                } catch (error) {
                    alert(`文件 ${file.name} 上传失败：${error.message}`);
                }
            }

            renderImages();
            event.target.value = '';
        }

        // 使用 Cloudinary 免费图床（无需 API Key，使用 unsigned upload）
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default'); // 使用预设
            
            // 使用免费的 Cloudinary cloud
            const cloudName = 'demo';
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`上传失败: ${errorText.substring(0, 100)}`);
            }

            const data = await response.json();
            return data.secure_url;
        }

        // 使用 Vercel API 上传（解决跨域问题）
        async function uploadToVercelApi(file) {
            // 将文件转为 base64
            const base64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });

            // 调用 Vercel API
            const response = await fetch('/api/upload', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ file: base64 })
            });

            if (!response.ok) {
                const error = await response.text();
                throw new Error('上传失败: ' + error);
            }

            const data = await response.json();
            return data.url;
        }

        async function uploadToOSS(file, objectKey) {
            console.log('开始上传到 OSS:', {
                host: OSS_CONFIG.host,
                objectKey: objectKey,
                fileName: file.name,
                fileSize: file.size
            });

            const policy = {
                expiration: new Date(Date.now() + 3600000).toISOString(),
                conditions: [
                    ['content-length-range', 0, 5 * 1024 * 1024],
                    ['eq', '$key', objectKey],
                    ['eq', '$bucket', OSS_CONFIG.bucket],
                    ['eq', '$x-oss-object-acl', 'public-read']
                ]
            };

            const policyBase64 = btoa(JSON.stringify(policy));
            const signature = CryptoJS.HmacSHA1(policyBase64, OSS_CONFIG.accessKeySecret).toString(CryptoJS.enc.Base64);

            const formData = new FormData();
            formData.append('key', objectKey);
            formData.append('OSSAccessKeyId', OSS_CONFIG.accessKeyId);
            formData.append('policy', policyBase64);
            formData.append('Signature', signature);
            formData.append('success_action_status', '200');
            formData.append('x-oss-object-acl', 'public-read');
            formData.append('file', file);

            console.log('发送请求到:', OSS_CONFIG.host);

            try {
                const response = await fetch(OSS_CONFIG.host, {
                    method: 'POST',
                    body: formData
                });

                console.log('OSS 响应状态:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('OSS 错误响应:', errorText);
                    throw new Error(`OSS 上传失败：${response.status} ${errorText}`);
                }

                const url = `${OSS_CONFIG.host}/${objectKey}`;
                console.log('上传成功，URL:', url);
                return url;
            } catch (error) {
                console.error('上传过程错误:', error);
                throw error;
            }
        }

        function deleteUploadedImage(index) {
            if (index >= 0 && index < state.uploadedImages.length) {
                state.uploadedImages.splice(index, 1);
                recalculateSelection();
                renderImages();
            }
        }

        function recalculateSelection() {
            const allImagesLength = state.uploadedImages.length + state.images.length;
            const newSelection = new Set();
            for (const index of state.selectedImages) {
                if (index < allImagesLength) newSelection.add(index);
            }
            state.selectedImages = newSelection;
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = state.selectedImages.size;
        }

        async function generateVideo() {
            const titlesText = document.getElementById('titleInput').value.trim();
            const scriptContent = document.getElementById('scriptContent').value.trim();
            const title = titlesText.split('\n')[0].trim();

            if (!title) {
                showError('请输入视频标题（至少第一行）');
                return;
            }
            if (!scriptContent) {
                showError('请输入口播文案');
                return;
            }
            if (state.selectedImages.size === 0) {
                showError('请先选择至少 1 张图片再生成视频');
                return;
            }

            const allImages = [...state.uploadedImages.map(img => img.url), ...state.images];
            const selectedImages = Array.from(state.selectedImages).sort((a, b) => a - b).map(i => allImages[i]);

            const videoSection = document.getElementById('videoSection');
            const videoGenerating = document.getElementById('videoGenerating');
            const videoResult = document.getElementById('videoResult');
            const videoPlaceholder = document.getElementById('videoPlaceholder');
            const generateContentBtn = document.getElementById('generateContentBtn');
            const generateVideoBtn = document.getElementById('generateVideoBtn');

            videoSection.classList.remove('hidden');
            videoPlaceholder.classList.add('hidden');
            videoGenerating.classList.remove('hidden');
            videoResult.classList.add('hidden');
            generateContentBtn.disabled = true;
            generateVideoBtn.disabled = true;
            document.getElementById('clearSelectionBtn').disabled = true;
            hideError();

            try {
                console.log('开始生成视频...');
                console.log('标题:', title);
                console.log('脚本内容长度:', scriptContent ? scriptContent.length : 0);
                console.log('脚本内容:', scriptContent);
                console.log('图片数量:', selectedImages.length);
                console.log('图片列表:', selectedImages);
                
                // 验证必要参数
                if (!title || !title.trim()) {
                    throw new Error('标题不能为空');
                }
                if (!scriptContent || !scriptContent.trim()) {
                    throw new Error('脚本内容不能为空');
                }
                if (!selectedImages || selectedImages.length === 0) {
                    throw new Error('请至少上传一张图片');
                }
                
                // 验证图片 URL
                for (let i = 0; i < selectedImages.length; i++) {
                    const imgUrl = selectedImages[i];
                    console.log(`图片 ${i+1} URL:`, imgUrl);
                    if (!imgUrl || typeof imgUrl !== 'string' || !imgUrl.startsWith('http')) {
                        console.error(`图片 ${i+1} URL 格式不正确:`, imgUrl);
                        throw new Error(`图片 ${i+1} URL 格式不正确：${imgUrl}`);
                    }
                }

                const controller = new AbortController();
                // 增加超时时间到 15 分钟，支持长文本处理
                const timeoutId = setTimeout(() => controller.abort(), 15 * 60 * 1000);

                // 构建请求体
                const requestBody = {
                    workflow_id: FLOW_B_CONFIG.workflow_id,
                    app_id: FLOW_B_CONFIG.app_id,
                    parameters: {
                        title: title.trim(),
                        content: scriptContent.trim(),
                        img: selectedImages
                    }
                };

                console.log('发送请求到:', FLOW_B_CONFIG.url);
                console.log('请求参数:', JSON.stringify(requestBody, null, 2));

                const response = await fetch(FLOW_B_CONFIG.url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${FLOW_B_CONFIG.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                console.log('响应状态:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('错误响应:', errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText || response.statusText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let videoUrl = null;
                let rawContent = null;

                console.log('开始读取流式响应...');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    console.log('收到数据块:', chunk.substring(0, 500));
                    
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine || trimmedLine.startsWith('id:') || trimmedLine.startsWith('event:')) continue;
                        
                        if (trimmedLine.startsWith('data: ')) {
                            const dataStr = trimmedLine.slice(6);
                            console.log('原始数据:', dataStr.substring(0, 500));
                            
                            try {
                                const data = JSON.parse(dataStr);
                                console.log('解析数据:', data);
                                
                                if (data.error_message || (data.data && data.data.error_message)) {
                                    const errorMsg = data.error_message || data.data.error_message;
                                    console.error('API 错误:', data);
                                    throw new Error(`Coze API 错误：${errorMsg}`);
                                }
                                
                                if (data.data && typeof data.data.output === 'string' && data.data.output.startsWith('http')) {
                                    videoUrl = data.data.output;
                                    rawContent = videoUrl;
                                    console.log('找到视频 URL:', videoUrl);
                                    break;
                                }
                                
                                if (data.content && !videoUrl) {
                                    try {
                                        const contentData = JSON.parse(data.content);
                                        console.log('内容数据:', contentData);
                                        if (contentData.output && typeof contentData.output === 'string' && contentData.output.startsWith('http')) {
                                            videoUrl = contentData.output;
                                            rawContent = videoUrl;
                                            console.log('找到视频 URL:', videoUrl);
                                            break;
                                        }
                                    } catch (e) {}
                                }
                            } catch (e) {
                                if (e.message.includes('Coze API 错误')) throw e;
                                console.log('解析 JSON 失败:', e);
                            }
                        }
                    }
                    if (videoUrl) break;
                }


                console.log('最终视频 URL:', videoUrl);
                console.log('原始内容:', rawContent);

                if (!videoUrl) {
                    throw new Error('未找到视频 URL，请检查输入参数是否正确。原始输出：' + (rawContent || '无'));
                }

                videoGenerating.classList.add('hidden');
                videoResult.classList.remove('hidden');
                document.getElementById('videoPlayer').src = videoUrl;
                document.getElementById('downloadBtn').href = videoUrl;

            } catch (error) {
                console.error('视频生成错误:', error);
                videoGenerating.classList.add('hidden');
                videoPlaceholder.classList.remove('hidden');
                showError('视频生成失败：' + error.message);
            } finally {
                generateContentBtn.disabled = false;
                generateVideoBtn.disabled = false;
                document.getElementById('clearSelectionBtn').disabled = false;
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        // 更新字数统计
        function updateCharCount(inputId, countId) {
            const input = document.getElementById(inputId);
            const count = document.getElementById(countId);
            const text = input.value;
            count.textContent = text.length + '字';
        }

        // 图片预览相关
        let currentImageIndex = 0;
        let allImagesList = [];

        function openImageModal(index) {
            allImagesList = [...state.uploadedImages.map(img => img.url), ...state.images];
            if (allImagesList.length === 0) return;
            
            currentImageIndex = index;
            updateModalImage();
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeImageModal(event) {
            if (event && event.target.tagName === 'IMG') return;
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateModalImage() {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = allImagesList[currentImageIndex];
            document.getElementById('currentIndex').textContent = currentImageIndex + 1;
            document.getElementById('totalCount').textContent = allImagesList.length;
        }

        function showPrevImage() {
            if (allImagesList.length === 0) return;
            currentImageIndex = (currentImageIndex - 1 + allImagesList.length) % allImagesList.length;
            updateModalImage();
        }

        function showNextImage() {
            if (allImagesList.length === 0) return;
            currentImageIndex = (currentImageIndex + 1) % allImagesList.length;
            updateModalImage();
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('imageModal');
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closeImageModal({target: modal});
            } else if (e.key === 'ArrowLeft') {
                showPrevImage();
            } else if (e.key === 'ArrowRight') {
                showNextImage();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            renderImages();
            updateCharCount('titleInput', 'titleCount');
            updateCharCount('scriptContent', 'scriptCount');
        });
    </script>
</body>
</html>
